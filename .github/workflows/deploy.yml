name: Deploy leaderboard to Pages

# Static-only deploy. board.json / *.jsonl are built LOCALLY by the eval
# workspace's build_results.py and committed under data/leaderboard/ — this
# workflow just packages site/ + data/ and publishes them. It never runs the
# heavy scorer (needs the scoring venv, gold sets, and raw results/*.jsonl).

on:
  push:
    branches: [main]
    paths:
      - 'site/**'
      - 'data/leaderboard/**'
      - 'deploy/**'
      - '.github/workflows/deploy.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# one deploy at a time; a newer push supersedes an in-flight one
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - name: Assemble public artifact
        run: bash deploy/build_public.sh
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: _public
      - id: deployment
        uses: actions/deploy-pages@v4
